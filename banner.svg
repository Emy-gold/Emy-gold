<svg width="100%" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a0472">
        <animate attributeName="stop-color" values="#4a0472;#9d4edd;#4a0472" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#9d4edd">
        <animate attributeName="stop-color" values="#9d4edd;#c77dff;#9d4edd" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#e0aaff">
        <animate attributeName="stop-color" values="#e0aaff;#c77dff;#e0aaff" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <rect width="1200" height="220" fill="url(#bgGrad)"/>

  <!-- animated wave layers -->
  <path fill="#ffffff" opacity="0.08">
    <animate attributeName="d" dur="7s" repeatCount="indefinite"
      values="
      M0,160 C300,200 900,120 1200,170 L1200,220 L0,220 Z;
      M0,180 C300,120 900,200 1200,150 L1200,220 L0,220 Z;
      M0,160 C300,200 900,120 1200,170 L1200,220 L0,220 Z"/>
  </path>
  <path fill="#ffffff" opacity="0.12">
    <animate attributeName="d" dur="5s" repeatCount="indefinite"
      values="
      M0,190 C400,150 800,210 1200,180 L1200,220 L0,220 Z;
      M0,170 C400,210 800,150 1200,200 L1200,220 L0,220 Z;
      M0,190 C400,150 800,210 1200,180 L1200,220 L0,220 Z"/>
  </path>

  <!-- title text, fades and rises in -->
  <text x="600" y="95" font-family="Segoe UI, Verdana, sans-serif" font-size="44" font-weight="700"
        fill="#ffffff" text-anchor="middle">
    Hi There, I'm Emy 👋
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.15;0.5" dur="2.5s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate"
      values="0,20;0,20;0,0" keyTimes="0;0.15;0.5" dur="2.5s" fill="freeze"/>
  </text>

  <text x="600" y="140" font-family="Fira Code, Consolas, monospace" font-size="20"
        fill="#f3e8ff" text-anchor="middle" opacity="0">
    Java &amp; Python Developer • Full Stack Learner • ML Enthusiast
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.4;0.8" dur="3s" fill="freeze"/>
  </text>

  <!-- pulsing accent dots -->
  <circle cx="120" cy="40" r="5" fill="#ffffff" opacity="0.6">
    <animate attributeName="r" values="4;7;4" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1080" cy="55" r="4" fill="#ffffff" opacity="0.5">
    <animate attributeName="r" values="3;6;3" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1000" cy="170" r="4" fill="#ffffff" opacity="0.4">
    <animate attributeName="r" values="3;6;3" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.8s" repeatCount="indefinite"/>
  </circle>
</svg>
